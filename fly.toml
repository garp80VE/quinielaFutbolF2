# ── Quiniela WFC 2026 — Fly.io Configuration ─────────────────────────────────
# Documentación: https://fly.io/docs/reference/configuration/

app = "quiniela-futbol"        # ← puedes cambiar este nombre (debe ser único en Fly.io)
primary_region = "mia"         # Miami — el más cercano a México

[build]
  dockerfile = "Dockerfile"

[env]
  PORT     = "8000"
  WA_PORT  = "3001"

# ── Servicio HTTP ──────────────────────────────────────────────────────────────
[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = false   # ← MUY IMPORTANTE: mantiene el polling de ESPN activo
  auto_start_machines = true
  min_machines_running = 1

# ── Máquina virtual ───────────────────────────────────────────────────────────
# 512 MB es el mínimo recomendado para Python + Node.js corriendo juntos.
# El free tier cubre 256 MB; los primeros $5/mes de Fly.io son gratuitos
# y una VM de 512 MB cuesta ~$3/mes — entra dentro del allowance.
[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

# ── Volumen persistente para sesión de WhatsApp (Baileys) ─────────────────────
# Crear el volumen con: fly volumes create quiniela_data --region mia --size 1
[[mounts]]
  source      = "quiniela_data"
  destination = "/data"
